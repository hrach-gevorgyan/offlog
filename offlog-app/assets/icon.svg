<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#faf9f7"/>

  <!-- Three kanban columns -->
  <rect x="148" y="280" width="196" height="464" rx="28" fill="#e8e2d8"/>
  <rect x="414" y="280" width="196" height="464" rx="28" fill="#e8e2d8"/>
  <rect x="680" y="280" width="196" height="464" rx="28" fill="#e8e2d8"/>

  <!-- Cards in column 1 -->
  <rect x="172" y="316" width="148" height="88" rx="16" fill="#ffffff"/>
  <rect x="172" y="420" width="148" height="88" rx="16" fill="#ffffff"/>
  <rect x="172" y="524" width="148" height="88" rx="16" fill="#ffffff"/>

  <!-- Cards in column 2 -->
  <rect x="438" y="316" width="148" height="88" rx="16" fill="#4f7bc4" opacity="0.18"/>
  <rect x="438" y="420" width="148" height="88" rx="16" fill="#ffffff"/>

  <!-- Cards in column 3 -->
  <rect x="704" y="316" width="148" height="88" rx="16" fill="#ffffff"/>

  <!-- Accent card highlight in col 2 top -->
  <rect x="438" y="316" width="148" height="88" rx="16" fill="#4f7bc4"/>

  <!-- Lines on white cards col 1 -->
  <rect x="192" y="343" width="80" height="10" rx="5" fill="#c8c2b8"/>
  <rect x="192" y="361" width="108" height="10" rx="5" fill="#dedad4"/>
  <rect x="192" y="447" width="92" height="10" rx="5" fill="#c8c2b8"/>
  <rect x="192" y="465" width="72" height="10" rx="5" fill="#dedad4"/>
  <rect x="192" y="551" width="100" height="10" rx="5" fill="#c8c2b8"/>
  <rect x="192" y="569" width="60" height="10" rx="5" fill="#dedad4"/>

  <!-- Lines on accent card col 2 -->
  <rect x="458" y="343" width="80" height="10" rx="5" fill="#ffffff" opacity="0.7"/>
  <rect x="458" y="361" width="108" height="10" rx="5" fill="#ffffff" opacity="0.45"/>

  <!-- Lines on col 2 second card -->
  <rect x="458" y="447" width="88" height="10" rx="5" fill="#c8c2b8"/>
  <rect x="458" y="465" width="64" height="10" rx="5" fill="#dedad4"/>

  <!-- Lines on col 3 card -->
  <rect x="724" y="343" width="76" height="10" rx="5" fill="#c8c2b8"/>
  <rect x="724" y="361" width="96" height="10" rx="5" fill="#dedad4"/>
</svg>
