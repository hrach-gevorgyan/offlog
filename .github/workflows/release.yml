name: Release

# Builds the Android APK and the Windows Tauri installer automatically
# whenever a version tag (vX.Y.Z) is pushed, and attaches both to a DRAFT
# GitHub Release -- never auto-published. You still review and click
# "Publish release" yourself; this only removes the manual local build
# step that used to eat a lot of time (and Gradle/cargo build turns)
# every release.
#
# Android signing note: this still signs with AGP's public debug keystore
# (see CLAUDE.md's release checklist) -- the real Play Store signing key
# exists (generated 2026-07-22, stored outside the repo) but isn't wired
# into build.gradle yet. Once it is, this workflow will need two GitHub
# repo secrets added (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64 -- `base64 -w0 offlog-release.keystore`
#   ANDROID_KEYSTORE_PASSWORD
# and a decode+wire-up step added before the Gradle build. Not added yet
# since the key isn't in use yet.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write  # needed to create the draft release + upload assets

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: offlog-app/package-lock.json

      - name: Install web dependencies
        working-directory: offlog-app
        run: npm ci

      - name: Build web assets
        working-directory: offlog-app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android project
        working-directory: offlog-app
        run: npx cap sync android

      - name: Build release APK
        working-directory: offlog-app/android
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: offlog-app/android/app/build/outputs/apk/release/app-release.apk

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: offlog-app/package-lock.json

      - name: Install web dependencies
        working-directory: offlog-app
        run: npm ci

      - name: Build web assets
        working-directory: offlog-app
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri Windows installer
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: offlog-desktop
          # offlog-app/dist was already built above; tauri.conf.json's
          # frontendDist points straight at it, so there's no separate
          # frontend build step for tauri-action to run here.

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: offlog-desktop/src-tauri/target/release/bundle/nsis/*.exe

  draft-release:
    needs: [build-android, build-desktop-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-installer/*.exe
