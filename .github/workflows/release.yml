name: Release

# Builds the Android APK and the Windows Tauri installer automatically
# whenever a version tag (vX.Y.Z) is pushed, and attaches both to a DRAFT
# GitHub Release -- never auto-published. You still review and click
# "Publish release" yourself; this only removes the manual local build
# step that used to eat a lot of time (and Gradle/cargo build turns)
# every release.
#
# Android signing: build.gradle uses the real playstore signing config
# whenever offlog-app/android/app/keystore.properties is present (see
# keystore.properties.example for the format), falling back to AGP's
# public debug keystore otherwise. This workflow writes that file (and
# the keystore itself) from repo secrets before building -- if those
# secrets aren't set, the build silently falls back to the debug keystore
# instead of failing, so this workflow still works before you've added
# them. Add these under Settings -> Secrets and variables -> Actions:
#   ANDROID_KEYSTORE_BASE64   -- `base64 -w0 offlog-release.keystore`
#   ANDROID_KEYSTORE_PASSWORD -- same value used for both store and key
#                                 password (see keystore.properties.example)
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write  # needed to create the draft release + upload assets

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: offlog-app/package-lock.json

      - name: Install web dependencies
        working-directory: offlog-app
        run: npm ci

      - name: Build web assets
        working-directory: offlog-app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android project
        working-directory: offlog-app
        run: npx cap sync android

      - name: Write real signing key (if configured)
        working-directory: offlog-app/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        # No-ops (leaves build.gradle to fall back to the debug keystore)
        # if the secrets haven't been added yet -- lets this workflow work
        # before and after the real key is wired in, without two separate
        # workflow files to maintain.
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > offlog-release.keystore
            echo "storeFile=offlog-release.keystore" > keystore.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
            echo "keyAlias=offlog" >> keystore.properties
            echo "keyPassword=$KEYSTORE_PASSWORD" >> keystore.properties
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not set -- building with the debug keystore instead."
          fi

      - name: Build release APK
        working-directory: offlog-app/android
        # gradlew's executable bit doesn't always survive a checkout on a
        # repo that's also been worked on from Windows (git tracks the
        # mode bit, but it can get lost) -- set it explicitly rather than
        # relying on whatever's committed.
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: offlog-app/android/app/build/outputs/apk/release/app-release.apk

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: offlog-app/package-lock.json

      - name: Install web dependencies
        working-directory: offlog-app
        run: npm ci

      - name: Build web assets
        working-directory: offlog-app
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Fetch vendored CouchDB (not checked into git, ~200MB)
        working-directory: offlog-desktop
        shell: pwsh
        run: ./scripts/fetch-couchdb-win.ps1

      - name: Build Tauri Windows installer
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: offlog-desktop
          # offlog-app/dist was already built above; tauri.conf.json's
          # frontendDist points straight at it, so there's no separate
          # frontend build step for tauri-action to run here.

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: offlog-desktop/src-tauri/target/release/bundle/nsis/*.exe

  draft-release:
    needs: [build-android, build-desktop-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-installer/*.exe
